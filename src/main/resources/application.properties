# ============================================================
#  KITE CONNECT CREDENTIALS
# ============================================================
kite.api.key=1xf8zzdlwvpozaan
kite.api.secret=lurzqgc09noc1nom1je3b0ioajvkofht
kite.redirect.url=http://localhost:8080/auth/callback
kite.base.url=https://api.kite.trade
kite.ws.url=wss://ws.kite.trade
spring.main.allow-circular-references=true
# ============================================================
#  WATCHLIST ? add as many stocks as you want (up to 1000)
#  Format: EXCHANGE:SYMBOL,EXCHANGE:SYMBOL,...
#
#  SAMPLE 20-STOCK NIFTY 50 SUBSET (uncomment to use):
# ============================================================
trading.watchlist=NSE:RELIANCE,NSE:TCS,NSE:INFY,NSE:HDFCBANK,NSE:ICICIBANK,NSE:SBIN,NSE:AXISBANK,NSE:KOTAKBANK,NSE:WIPRO,NSE:HCLTECH,NSE:TATASTEEL,NSE:JSWSTEEL,NSE:BAJFINANCE,NSE:BAJAJFINSV,NSE:MARUTI,NSE:TATAMOTORS,NSE:ONGC,NSE:POWERGRID,NSE:NTPC,NSE:SUNPHARMA

# Lot sizes matching the watchlist order above (for F&O hedging)
# Check current lot sizes at: https://www.nseindia.com/products/content/derivatives/equities/fo_underlying_mktlot.htm
trading.lot.sizes=250,150,300,550,1375,1500,1200,400,1600,700,5000,3000,125,200,100,1400,1925,3100,3750,700

# ============================================================
#  CAPITAL ALLOCATION (Rs 12 Lakhs)
# ============================================================
trading.capital.total=1200000
trading.capital.intraday=300000
trading.capital.positional=400000
trading.capital.fno=300000
trading.capital.buffer=200000

# Capital risk per instrument per trade
# With 20 stocks and Rs3L intraday capital: Rs3L / 20 = Rs15,000 per stock
# With 100 stocks: Rs3L / 100 = Rs3,000 per stock
trading.capital.per.instrument=15000

# ============================================================
#  RISK MANAGEMENT
# ============================================================
trading.risk.percent=1.0
trading.atr.multiplier=1.5
trading.rr.ratio=2.0

# Max simultaneous open positions (increase for 100+ stock setups)
trading.max.open.positions=10

trading.max.portfolio.risk.percent=3.0
trading.daily.loss.limit.percent=1.5
trading.weekly.loss.limit.percent=3.0
trading.confluence.required=2

# ============================================================
#  TRAILING STOP
# ============================================================
trading.trailing.stop.enabled=true
trading.trailing.breakeven.at.r=1.0
trading.trailing.lock.profit.at.r=2.0
trading.trailing.lock.profit.percent=0.5

# ============================================================
#  PAPER TRADING (keep true until you are confident!)
#  ??  CAUTION: Set to FALSE only after 2-4 weeks successful paper trading!
#  ??  LIVE TRADING WILL PLACE REAL ORDERS WITH REAL MONEY!
# ============================================================
trading.paper.mode=false

# ============================================================
#  TIMING
# ============================================================
trading.squareoff.time=15:15
# Poll interval: 60s for 20 stocks, increase to 120s for 100+ stocks
# to avoid hitting Kite API rate limits (10 req/sec)
trading.poll.interval.ms=60000

# ============================================================
#  TELEGRAM NOTIFICATIONS
#  Setup: https://core.telegram.org/bots#creating-a-new-bot
# ============================================================
telegram.enabled=false
telegram.bot.token=YOUR_BOT_TOKEN_HERE
telegram.chat.id=YOUR_CHAT_ID_HERE

# ============================================================
#  DATABASE (H2 file-based ? survives restarts)
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/kitetrader;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
#  SERVER & LOGGING
# ============================================================
server.port=8080
spring.application.name=kite-trader-pro
logging.level.com.kitetrader=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n
